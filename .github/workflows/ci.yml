name: CI

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install flake8 black
      - name: Check formatting
        run: black --check src/ tests/
      - name: Lint
        run: flake8 src/ tests/ --max-line-length=121 --extend-ignore=E203,E402 --exit-zero

  frontend-unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: src/TicketMonarch/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Run tests with coverage
        run: npm test

      - name: Upload frontend coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: src/TicketMonarch/frontend/tests/coverage/lcov.info
          flags: frontend
          name: frontend-unit-tests-vitest

  backend-unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            src/TicketMonarch/backend/requirements.txt
            src/TicketMonarch/backend/tests/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/TicketMonarch/backend/requirements.txt
          pip install pytest pytest-cov gymnasium
          pip install torch==2.2.2 --index-url https://download.pytorch.org/whl/cpu

      - name: Run tests with coverage
        env:
          PYTHONPATH: src
        run: |
          pytest src/TicketMonarch/backend/tests \
            --cov=src/TicketMonarch/backend \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: backend
          name: backend-unit-tests-pytest